<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agile Examination Quiz</title>
  <style>
    :root {
      --bg: #17191f;
      --panel: rgba(34, 38, 47, 0.92);
      --panel-strong: rgba(27, 30, 38, 0.94);
      --card: #1a1d24;
      --card-soft: #20242c;
      --text: #f3f5f8;
      --muted: #9aa3b2;
      --accent: #6bc2ff;
      --accent-soft: rgba(79, 163, 255, 0.18);
      --border: rgba(146, 160, 185, 0.18);
      --border-strong: rgba(146, 160, 185, 0.28);
      --correct: rgba(33, 98, 69, 0.38);
      --correct-border: rgba(73, 199, 136, 0.68);
      --wrong: rgba(112, 45, 47, 0.34);
      --wrong-border: rgba(233, 108, 111, 0.62);
      --shadow: 0 22px 50px rgba(0, 0, 0, 0.38);
      --answered-bg: linear-gradient(135deg, rgba(31, 91, 130, 0.72), rgba(24, 38, 73, 0.8));
      --unanswered-bg: linear-gradient(135deg, rgba(56, 61, 71, 0.9), rgba(42, 46, 55, 0.92));
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(71, 110, 255, 0.14), transparent 22%),
        radial-gradient(circle at 85% 12%, rgba(107, 194, 255, 0.12), transparent 18%),
        linear-gradient(180deg, #1b1f26 0%, #14171d 100%);
      min-height: 100vh;
      letter-spacing: 0.01em;
    }

    .shell {
      width: min(1000px, calc(100% - 32px));
      margin: 22px auto 42px;
      
    }

    .topbar,
    .quiz-stage,
    .actions {
      background: var(--panel);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 18px 18px 16px;
      margin-bottom: 18px;
    }

    .topbar-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 4px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.85rem, 2.4vw, 2.35rem);
      line-height: 1.05;
      font-weight: 100;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .mode-label {
      color: #e9edf5;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .meter {
      padding: 14px;
      border-radius: 18px;
      background: var(--panel-strong);
      border: 1px solid var(--border-strong);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .meter-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      font-weight: 700;
      color: #f2f5f8;
    }

    .meter-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .meter-stat {
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border-strong);
      background: var(--card-soft);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .meter-stat.answered {
      background: var(--answered-bg);
      box-shadow: 0 0 0 1px rgba(107, 194, 255, 0.24), 0 0 24px rgba(58, 136, 255, 0.14);
    }

    .meter-stat.unanswered {
      background: var(--unanswered-bg);
    }

    .meter-label {
      color: var(--muted);
      font-size: 0.84rem;
      margin-bottom: 6px;
    }

    .meter-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: #f5f7fb;
    }

    .quiz-stage {
      padding: 16px;
      margin-bottom: 14px;
    }

    .question {
      padding: 16px;
      border: 1px solid var(--border-strong);
      border-radius: 20px;
      background: var(--card);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .question.correct {
      background: var(--correct);
      border-color: var(--correct-border);
    }

    .question.wrong {
      background: var(--wrong);
      border-color: var(--wrong-border);
    }

    .question:last-child { margin-bottom: 0; }
    .question.hidden { display: none; }

    .question-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .q-label {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #aeb6c5;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .q-points {
      white-space: nowrap;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(155, 126, 85, 0.2);
      color: #c7ad86;
      font-size: 0.8rem;
      font-weight: 700;
      border: 1px solid rgba(199, 173, 134, 0.16);
    }

    .q-text {
      font-size: 1.08rem;
      line-height: 1.45;
      font-weight: 700;
      color: #f6f7fb;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 15px 16px;
      border-radius: 16px;
      border: 1px solid rgba(122, 139, 168, 0.34);
      background: #191d24;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: rgba(107, 194, 255, 0.45);
      box-shadow: 0 0 0 3px rgba(107, 194, 255, 0.06);
    }

    .option.correct-answer {
      border-color: var(--correct-border);
      background: rgba(22, 67, 47, 0.48);
    }

    .option.wrong-answer {
      border-color: var(--wrong-border);
      background: rgba(93, 34, 39, 0.42);
    }

    .option input {
      margin-top: 3px;
      transform: scale(1.1);
      accent-color: var(--accent);
    }

    .option-text {
      flex: 1;
      line-height: 1.45;
      color: #eef2f8;
    }

    .text-answer {
      width: 100%;
      border: 1px solid rgba(122, 139, 168, 0.34);
      border-radius: 16px;
      min-height: 90px;
      padding: 14px 16px;
      font: inherit;
      resize: vertical;
      background: #191d24;
      color: var(--text);
    }

    .text-answer:focus {
      outline: 2px solid rgba(107, 194, 255, 0.18);
      border-color: rgba(107, 194, 255, 0.5);
    }

    .feedback {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed rgba(160, 173, 194, 0.22);
      display: none;
    }

    .feedback.show { display: block; }

    .feedback-status {
      font-weight: 800;
      margin-bottom: 6px;
    }

    .feedback-status.correct { color: #1f7f4d; }
    .feedback-status.wrong { color: #b4342a; }

    .correct-answer-line {
      color: #d7dbe5;
      line-height: 1.45;
    }

    .actions {
      padding: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      position: sticky;
      bottom: 14px;
      background: rgba(39, 43, 52, 0.9);
    }

    .action-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 20px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      color: #f3f6fb;
      transition: transform 0.15s ease, opacity 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
    }

    .submit-btn {
      background: linear-gradient(135deg, #495360, #39414c);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .next-btn,
    .prev-btn {
      background: linear-gradient(135deg, #495360, #39414c);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .retry-btn {
      background: linear-gradient(135deg, #495360, #39414c);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .reset-btn {
      background: rgba(255, 255, 255, 0.02);
      color: #aeb7c6;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .tab-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 10px 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      margin-bottom: 14px;
    }

    .tab-buttons {
      display: inline-flex;
      gap: 8px;
      padding: 4px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .tab-caption {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .tab-btn {
      background: transparent;
      color: #d7deea;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 700;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #5db6ff, #5ea8ff);
      color: #eff6ff;
      box-shadow: 0 0 18px rgba(93, 182, 255, 0.45);
    }

    .meta-strip {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      color: #eef2f7;
      font-weight: 700;
    }

    @media (max-width: 860px) {
      .topbar-head,
      .meta-strip,
      .actions {
        flex-direction: column;
        align-items: stretch;
      }

      .actions {
        position: static;
      }

      .action-group,
      button {
        width: 100%;
      }

      .action-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="topbar">
      <div class="topbar-head">
        <div>
          <h1>Full Agile Quiz</h1>
        
        </div>
        <div class="mode-label" id="modeLabel">All Questions</div>
      </div>
      <div class="meter">
        <div class="meter-head">
          <span>Current Tab</span>
          <span id="progressText">89 questions</span>
        </div>
        <div class="meter-stats">
          <div class="meter-stat answered">
            <div class="meter-label">Answered</div>
            <div class="meter-value" id="answeredCount">0</div>
          </div>
          <div class="meter-stat unanswered">
            <div class="meter-label">Unanswered</div>
            <div class="meter-value" id="unansweredCount">89</div>
          </div>
        </div>
      </div>
    </section>

    <main class="quiz-stage" id="quiz">
      <div class="tab-bar">
        <div class="tab-buttons" role="tablist" aria-label="Question type filter">
          <button class="tab-btn active" id="allTab" data-filter="all" type="button">All Questions</button>
          <button class="tab-btn" data-filter="mcq" type="button">Only MCQs</button>
          <button class="tab-btn" data-filter="text" type="button">Fill in the blanks</button>
        </div>
        <div class="tab-caption">Filter Tabs</div>
      </div>
      <div class="meta-strip">
        <span id="questionPosition">Question 1 of 89</span>
        <span id="sectionPosition">Section</span>
      </div>
      <div id="questionHost"></div>
    </main>

    <div class="actions">
      <div class="action-group">
        <button class="prev-btn" id="prevBtn" type="button">Previous</button>
        <button class="submit-btn" id="checkBtn" type="button">Check Answer</button>
        <button class="retry-btn" id="retryBtn" type="button">Retry</button>
      </div>
      <div class="action-group">
        <button class="next-btn" id="nextBtn" type="button">Next Question</button>
        <button class="reset-btn" id="resetBtn" type="button">Reset Quiz</button>
      </div>
    </div>
  </div>

  <script>
    const sections = [
      {
        title: "Fundamentals",
        code: "A1",
        questions: [
          { number: "1", type: "text", points: 8, prompt: "What was the reason for introducing Agile Computing (max. one phrases)?", answer: "Challenges posed by novel and exploratory projects that involve high uncertainty, rapid change, and collaborative problem-solving.", aliases: ["Challenges posed by novel and exploratory projects that involve high uncertainty, rapid change, and collaborative problem solving."] },
          { number: "2", type: "checkbox", points: 2, prompt: "What are the overall goals of agility in project management?", options: ["Adhere strictly to the initial plan", "Respond to change", "Extensive customer involvement", "Avoid cross-functional collaboration"], answer: [1, 2] },
          { number: "3", type: "radio", points: 1, prompt: "In Agile project management, what is measured as progress?", options: ["Completion of phases (design, coding, testing)", "Readiness of a feature for review and deployment by customers", "Meeting milestones on schedule"], answer: 1 },
          { number: "4", type: "text", points: 8, prompt: "Explain the concept of continuous improvement in Agile project management (max. one phrase)?", answer: "Integrating customer feedback from each iteration into subsequent cycles to enhance the product over time. Focus on adapting to changing requirements and improving features based on continuous evaluation.", aliases: ["Integrating customer feedback from each iteration into subsequent cycles to enhance the product over time. Focus on adapting to changing requirements and improving features based on continuous evaluation"] },
          { number: "5", type: "checkbox", points: 2, prompt: "What are the benefits of Agile project management compared to traditional approaches?", options: ["Increase in project scope", "Speed up delivery", "Reduce risk", "Add more complexity"], answer: [1, 2] },
          { number: "6", type: "radio", points: 1, prompt: "How does Agile project management handle change management?", options: ["Through Integrated Change Control", "Through separate change request processes", "By integrating change into short cycles"], answer: 2 },
          { number: "7", type: "checkbox", points: 2, prompt: "What are the primary values of the Agile Manifesto?", options: ["Individuals and interactions", "Process and tools", "Comprehensive documentation", "Responding to change"], answer: [0, 3] },
          { number: "8", type: "text", points: 6, prompt: "Describe the concept of incremental approach in Agile project management (max. one phrase).", answer: "Involves developing a product in increments based on feature priority, which allows for frequent delivery of usable components and facilitates adaptation to changing requirements throughout the project lifecycle.", aliases: ["Involves developing a product in increments based on feature priority, which allows for frequent delivery of usable components and facilitates adaptation to changing requirements through the project lifecycle."] }
        ]
      },
      {
        title: "Agile principles",
        code: "A2",
        questions: [
          { number: "1", type: "checkbox", points: 2, prompt: "According to agile principles, what is the primary measure of progress in software development?", options: ["Completion of project phases", "Customer satisfaction surveys", "Delivery of fully functional software", "Number of meetings held"], answer: [0, 2] },
          { number: "2", type: "radio", points: 1, prompt: "What is a core principle of agile development regarding team motivation?", options: ["Delegating all decisions from the project leader", "Micromanaging each team member's work", "Encouraging team members to make decisions on their own"], answer: 2 },
          { number: "3", type: "checkbox", points: 2, prompt: "What are key aspects of face-to-face communication in agile development?", options: ["It is always conducted in a formal meeting setting", "It is essential for effective information sharing among team members", "It is the primary communication method regardless of circumstances", "It is used alongside other communication media when necessary"], answer: [1, 3] },
          { number: "4", type: "radio", points: 1, prompt: "What does sustaining a constant pace of development in agile encourage?", options: ["Irregular working hours", "Working overtime to meet deadlines", "Consistent and sustainable work hours"], answer: 2 },
          { number: "5", type: "text", points: 6, prompt: "Explain the purpose of continuous attention to technical excellence in agile development (max. one phrase).", answer: "It ensures that the developed products meet high-quality standards, incorporate best practices, and remain adaptable to changing requirements.", aliases: ["It ensures that the developed products meet high quality standards, incorporate best practices, and remain adaptable to changing requirements."] }
        ]
      },
      {
        title: "From waterfall to agile",
        code: "A3",
        questions: [
          { number: "1", type: "text", points: 6, prompt: "Describe the key differences between a waterfall model and an agile model in terms of their approach to software development (max. one phrase).", answer: "The waterfall model follows a linear, sequential approach where each phase (requirements, design, development, testing, deployment) is completed before moving to the next, with little room for revisiting or adapting previous phases, while the agile model emphasizes iterative development, continuous feedback, and flexibility to adapt to changing requirements.", aliases: ["The waterfall model follows a linear, sequential approach where each phase (requirements, design, development, testing, deployment) is completed before moving to the next, with little room for revisiting or adapting previous phases while the agile model emphasizes iterative development, continuous feedback, and flexibility to adapt to changing requirements."] },
          { number: "2", type: "radio", points: 1, prompt: "What is a key limitation of the waterfall model regarding customer feedback?", options: ["Feedback is obtained early in the process", "Feedback is provided during development", "Feedback is obtained only after testing"], answer: 2 },
          { number: "3", type: "radio", points: 1, prompt: "How does an incremental model differ from a traditional waterfall model?", options: ["It completes all development phases in a linear sequence", "It prioritizes features into must-have, should-have, and nice-to-have categories", "It releases working software only after all phases are completed"], answer: 1 }
        ]
      },
      {
        title: "Project plan",
        code: "A4",
        questions: [
          { number: "1", type: "text", points: 6, prompt: "Describe the traditional role of a project plan (max. one phrase!).", answer: "Comprehensive documents that aids project managers in executing and overseeing project phases.", aliases: ["Comprehensive document that aids project managers in executing and overseeing project phases.", "Comprehensive documents that aid project managers in executing and overseeing project phases."] },
          { number: "2", type: "text", points: 8, prompt: "Explain how an agile project plan differs from a plan used in a defined development model (max. one phrase!).", answer: "An agile project plan is viewed as a flexible guide that adapts to changing requirements.", aliases: ["An agile project plan is viewed as flexible guide that adapts to changing requirements."] }
        ]
      },
      {
        title: "Agile triangle",
        code: "A5",
        questions: [
          { number: "1", type: "radio", points: 1, prompt: "What does the agile iron triangle prioritize as the main fixed constraint for project success?", options: ["Scope", "Cost", "Schedule"], answer: 2 },
          { number: "2", type: "checkbox", points: 2, prompt: "According to the agile iron triangle, what is the main goal of project success?", options: ["Adapting to fixed plans", "Meeting predefined scope and cost", "Delivering value to the customer", "Following a strict schedule"], answer: [0, 2] },
          { number: "3", type: "text", points: 6, prompt: "Describe the key differences between the traditional iron triangle of constraints and the agile iron triangle (max. one phrase!).", answer: "The traditional iron triangle focuses on predefined scope, cost, and schedule as fixed constraints for project success, while the agile iron triangle emphasizes the ability to respond to change and deliver value to the customer, with scope and cost as variables.", aliases: ["The traditional iron triangle focuses on predefined scope, cost, and schedule as fixed constraints for project success, while the agile iron triangle emphasizes the ability to respond to change, deliver value to the customer, with scope and cost as variables."] }
        ]
      },
      {
        title: "Roles in agile teams",
        code: "B1",
        questions: [
          { number: "1", type: "radio", points: 1, prompt: "Who assumes much of the responsibility of a traditional project manager in agile projects?", options: ["Business analyst", "Scrum master", "Project leader"], answer: 2 },
          { number: "2", type: "checkbox", points: 2, prompt: "What responsibilities does a Scrum Master typically have in agile projects?", options: ["Delegating tasks to team members", "Tracking and monitoring project progress", "Managing cross-team coordination", "Coaching teams to achieve their goals"], answer: [1, 2] },
          { number: "3", type: "text", points: 2, prompt: "Briefly describe the role of a product manager (or product owner) in agile projects (max. two phrases).", answer: "The role of a product manager (or product owner) in agile projects is to ensure that the delivered product meets customer requirements.", aliases: ["The role of a product manager (or product owner) in agile projects is to ensure that the delivered product meets customer requirements"] },
          { number: "4", type: "checkbox", points: 2, prompt: "What is a key characteristic of T-shaped competence in agile teams?", options: ["Narrow focus on a specific field", "Lack of breadth of knowledge", "Ability to collaborate with specialists from other areas", "Depth of knowledge not only in one area"], answer: [2, 3] },
          { number: "5", type: "text", points: 3, prompt: "Name the three variables used to calculate speed according to the concept of team velocity in agile projects (max. six words!).", answer: "Lead time, cycle time, response time.", aliases: ["Lead time, cycle time, response time", "Lead time cycle time response time"] }
        ]
      },
      {
        title: "Managing risks",
        code: "C2",
        questions: [
          { number: "1", type: "checkbox", points: 2, prompt: "How does risk response planning differ in agile projects compared to traditional projects?", options: ["Conducted by project managers only", "Happens at the beginning of each project phase", "Involves the entire team and occurs more frequently", "Is less intensive than in traditional projects"], answer: [2, 3] },
          { number: "2", type: "text", points: 8, prompt: "Describe key components of an \"exception plan\" in agile risk management (max. 20 words).", answer: "Circumstances for the exception, causes of the circumstance, tolerance limits, possible solutions, recommended solutions, request for stakeholder decision.", aliases: ["Circumstances for the exception, causes of the circumstance, tolerance limits, possible solutions, recommended solutions, request for stakeholder decision"] }
        ]
      },
      {
        title: "Analyzing, monitoring, and controlling risks",
        code: "C3",
        questions: [
          { number: "1", type: "radio", points: 1, prompt: "How is risk analysis typically performed in agile projects?", options: ["Quantitative risk analysis", "Qualitative risk analysis", "Both quantitative and qualitative risk analysis"], answer: 1 },
          { number: "2", type: "radio", points: 1, prompt: "What does a risk burndown chart track over time in an agile project?", options: ["Severity of different project risks", "Team velocity", "Customer satisfaction ratings"], answer: 0 },
          { number: "3", type: "radio", points: 1, prompt: "What is the purpose of a spike in agile development?", options: ["To complete a user story", "To resolve technical uncertainties quickly", "To document project risks formally"], answer: 1 },
          { number: "4", type: "radio", points: 1, prompt: "How are risks monitored in agile teams?", options: ["Recorded in a formal risk register", "Monitored using highly visible information radiators", "Discussed only during iteration review meetings"], answer: 1 },
          { number: "5", type: "text", points: 6, prompt: "Explain the role of landing zones in agile risk management. Max. one phrase!", answer: "Landing zones define a range of acceptable product functionality and characteristics agreed between the team and customer during planning.", aliases: ["Landing zones define a range of acceptable product functionality and characteristics agreed between the team and customer during planning"] },
          { number: "6", type: "text", points: 1, prompt: "How is a short sprint called, that usually is of fixed length and in which a team examines a solution and makes a prototype to demonstrate the feasibility of this solution? Max. one word!", answer: "Spike", aliases: ["spike"] }
        ]
      },
      {
        title: "Agile quality management",
        code: "D3",
        questions: [
          { number: "1", type: "checkbox", points: 2, prompt: "Who is responsible for verifying and continually improving product quality in an agile project?", options: ["Developers", "Quality assurance staff only", "All project team members", "Project managers"], answer: [0, 2] },
          { number: "2", type: "checkbox", points: 2, prompt: "What is the purpose of quality control in agile development?", options: ["Preventing defects", "Identifying and resolving defects", "Executing acceptance tests", "Writing and executing unit tests"], answer: [1, 3] },
          { number: "3", type: "checkbox", points: 2, prompt: "Besides product quality, what are the other main areas where quality is important in agile projects?", options: ["Budget management", "Communications", "Human resources", "Conduct and compliance"], answer: [1, 3] },

          { number: "9", type: "radio", points: 1, prompt: "What is a core principle of Lean software development?", options: ["Encouraging long development cycles", "Emphasizing unnecessary documentation", "Focusing on system integrity"], answer: 2 },
          { number: "10", type: "radio", points: 1, prompt: "According to Lean development, how does the principle of 'deliver software quickly' translate into practice?", options: ["Anticipating future customer needs", "Identifying and maintaining bottlenecks in the process", "Planning smaller releases of software after shorter periods"], answer: 2 },
          { number: "11", type: "text", points: 6, prompt: "Briefly explain the principle of 'eliminate waste' in Lean development. Max. one phrase!", answer: "Removing unnecessary activities, documentation, and product features that do not add direct value to the end product.", aliases: ["Removing unnecessary activities, documentation, and product features that do not add direct value to the end product"] },
          { number: "12", type: "text", points: 6, prompt: "What is meant by 'sustainable pace' in the context of XP? Max. one phrase!", answer: "Practice of team members working no more than 40 hours per week to ensure consistent and reliable delivery of software, avoiding burnout and maintaining high-quality output.", aliases: ["Practice of team members working no more than 40 hours per week to ensure consistent and reliable delivery of software, avoiding burnout and maintaining high quality output."] },
          { number: "13", type: "radio", points: 1, prompt: "What is a distinguishing feature of Feature-driven development (FDD)?", options: ["It is unstructured but highly adaptive.", "It emphasizes a business perspective more than a technical one.", "It provides a prescriptive model that is managed at the level of individual features"], answer: 2 }

    ];

    const questionHost = document.getElementById("questionHost");
    const progressText = document.getElementById("progressText");
    const answeredCount = document.getElementById("answeredCount");
    const unansweredCount = document.getElementById("unansweredCount");
    const questionPosition = document.getElementById("questionPosition");
    const sectionPosition = document.getElementById("sectionPosition");
    const modeLabel = document.getElementById("modeLabel");
    const checkBtn = document.getElementById("checkBtn");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    const retryBtn = document.getElementById("retryBtn");
    const resetBtn = document.getElementById("resetBtn");
    const tabButtons = document.querySelectorAll(".tab-btn");

    const flatQuestions = sections.flatMap(section =>
      section.questions.map(question => ({
        ...question,
        sectionTitle: section.title,
        sectionCode: section.code
      }))
    );

    let currentFilter = "all";
    let filteredQuestions = [];
    let currentIndex = 0;
    let completed = false;
    let questionStates = {};

    function getQuestionKey(question) {
      return `${question.sectionCode}-${question.number}-${question.prompt}`;
    }

    function createInitialState() {
      const states = {};
      flatQuestions.forEach(question => {
        states[getQuestionKey(question)] = {
          checked: false,
          correct: null,
          answer: question.type === "text" ? "" : [],
          retryCount: 0
        };
      });
      return states;
    }

    function normalizeText(value) {
      return value
        .toLowerCase()
        .replace(/[“”]/g, "\"")
        .replace(/[‘’]/g, "'")
        .replace(/[^a-z0-9\s'-]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function getCorrectAnswerText(question) {
      if (question.type === "radio") return question.options[question.answer];
      if (question.type === "checkbox") return question.answer.map(index => question.options[index]).join("; ");
      return question.answer;
    }

    function evaluateText(question, userValue) {
      const normalizedUser = normalizeText(userValue);
      const accepted = [question.answer, ...(question.aliases || [])].map(normalizeText);
      return accepted.includes(normalizedUser);
    }

    function filterQuestions(mode) {
      if (mode === "mcq") {
        return flatQuestions.filter(question => question.type === "radio" || question.type === "checkbox");
      }
      if (mode === "text") {
        return flatQuestions.filter(question => question.type === "text");
      }
      return flatQuestions;
    }

    function updateProgress() {
      const total = filteredQuestions.length;
      if (!total) {
        progressText.textContent = "No questions in this tab";
        answeredCount.textContent = "0";
        unansweredCount.textContent = "0";
        questionPosition.textContent = "Question 0 of 0";
        sectionPosition.textContent = "No section";
        return;
      }

      const answered = filteredQuestions.filter(question => questionStates[getQuestionKey(question)].checked).length;
      const remaining = total - answered;
      progressText.textContent = `${total} question${total === 1 ? "" : "s"} in this tab`;
      answeredCount.textContent = String(answered);
      unansweredCount.textContent = String(remaining);
      questionPosition.textContent = completed ? `Completed ${total} of ${total}` : `Question ${currentIndex + 1} of ${total}`;
      sectionPosition.textContent = completed ? "Quiz finished" : `${filteredQuestions[currentIndex].sectionCode} ${filteredQuestions[currentIndex].sectionTitle}`;
      modeLabel.textContent = currentFilter === "mcq" ? "Only MCQs" : currentFilter === "text" ? "Fill in the blanks" : "All Questions";
    }

    function saveCurrentDraft() {
      if (!filteredQuestions.length) return;
      const question = filteredQuestions[currentIndex];
      const state = questionStates[getQuestionKey(question)];
      const questionEl = questionHost.querySelector(".question");
      if (!questionEl || state.checked) return;

      if (question.type === "text") {
        state.answer = questionEl.querySelector("textarea").value;
      } else {
        state.answer = Array.from(questionEl.querySelectorAll("input:checked")).map(input => Number(input.value));
      }
    }

    function applyAnswerStyling(question, state) {
      if (!state.checked || question.type === "text") return;
      const questionEl = questionHost.querySelector(".question");
      questionEl.querySelectorAll(".option").forEach(option => {
        const idx = Number(option.dataset.optionIndex);
        const selected = Array.isArray(state.answer) && state.answer.includes(idx);
        if (question.type === "radio") {
          if (idx === question.answer) option.classList.add("correct-answer");
          if (selected && idx !== question.answer) option.classList.add("wrong-answer");
        } else {
          if (question.answer.includes(idx)) option.classList.add("correct-answer");
          if (selected && !question.answer.includes(idx)) option.classList.add("wrong-answer");
        }
      });
    }

    function lockCurrentInputs(locked) {
      questionHost.querySelectorAll("input, textarea").forEach(el => {
        el.disabled = locked;
      });
    }

    function renderQuestion() {
      if (!filteredQuestions.length) {
        questionHost.innerHTML = "<article class=\"question\"><div class=\"q-text\">No questions match this tab.</div></article>";
        checkBtn.disabled = true;
        nextBtn.disabled = true;
        prevBtn.disabled = true;
        retryBtn.disabled = true;
        updateProgress();
        return;
      }

      const question = filteredQuestions[currentIndex];
      const state = questionStates[getQuestionKey(question)];

      const wrapper = document.createElement("article");
      wrapper.className = "question";
      wrapper.dataset.type = question.type;
      if (state.checked) {
        wrapper.classList.add(state.correct ? "correct" : "wrong");
      }

      wrapper.innerHTML = `
        <div class="question-head">
          <div>
            <div class="q-label">${question.sectionTitle} ${question.number}</div>
            <div class="q-text">${question.prompt}</div>
          </div>
          <div class="q-points">[${question.points}]</div>
        </div>
      `;

      if (question.type === "radio" || question.type === "checkbox") {
        const optionsWrap = document.createElement("div");
        optionsWrap.className = "options";
        question.options.forEach((option, optionIndex) => {
          const checked = Array.isArray(state.answer) && state.answer.includes(optionIndex);
          const label = document.createElement("label");
          label.className = "option";
          label.dataset.optionIndex = optionIndex;
          label.innerHTML = `
            <input type="${question.type}" name="current-question" value="${optionIndex}" ${checked ? "checked" : ""} />
            <span class="option-text">${option}</span>
          `;
          optionsWrap.appendChild(label);
        });
        wrapper.appendChild(optionsWrap);
      } else {
        const textarea = document.createElement("textarea");
        textarea.className = "text-answer";
        textarea.rows = 3;
        textarea.placeholder = "Type your answer here...";
        textarea.value = typeof state.answer === "string" ? state.answer : "";
        wrapper.appendChild(textarea);
      }

      const feedback = document.createElement("div");
      feedback.className = `feedback${state.checked ? " show" : ""}`;
      feedback.innerHTML = `
        <div class="feedback-status ${state.correct === true ? "correct" : state.correct === false ? "wrong" : ""}">
          ${state.checked ? `${state.correct ? "✔ Correct" : "✘ Wrong"}` : ""}
        </div>
        <div class="correct-answer-line">${state.checked && !state.correct ? `Correct Answer: ${getCorrectAnswerText(question)}` : ""}</div>
      `;
      wrapper.appendChild(feedback);

      questionHost.innerHTML = "";
      questionHost.appendChild(wrapper);

      applyAnswerStyling(question, state);
      lockCurrentInputs(state.checked);
      checkBtn.disabled = state.checked;
      retryBtn.disabled = !state.checked;
      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = false;
      nextBtn.textContent = currentIndex === filteredQuestions.length - 1 ? "Finish Quiz" : "Next Question";
      completed = currentIndex === filteredQuestions.length - 1 && state.checked && filteredQuestions.every(item => questionStates[getQuestionKey(item)].checked);
      updateProgress();
    }

    function checkCurrentAnswer() {
      if (!filteredQuestions.length) return;

      const question = filteredQuestions[currentIndex];
      const state = questionStates[getQuestionKey(question)];
      if (state.checked) return;

      saveCurrentDraft();

      let isCorrect = false;
      if (question.type === "radio") {
        if (!state.answer.length) return;
        isCorrect = state.answer[0] === question.answer;
      } else if (question.type === "checkbox") {
        if (!state.answer.length) return;
        const checked = [...state.answer].sort((a, b) => a - b);
        const correct = [...question.answer].sort((a, b) => a - b);
        isCorrect = JSON.stringify(checked) === JSON.stringify(correct);
      } else {
        if (!String(state.answer).trim()) return;
        isCorrect = evaluateText(question, state.answer);
      }

      state.checked = true;
      state.correct = isCorrect;
      renderQuestion();
    }

    function goNext() {
      if (!filteredQuestions.length) return;
      saveCurrentDraft();
      if (currentIndex < filteredQuestions.length - 1) {
        currentIndex += 1;
      } else {
        completed = filteredQuestions.every(item => questionStates[getQuestionKey(item)].checked);
      }
      renderQuestion();
    }

    function goPrevious() {
      if (!filteredQuestions.length || currentIndex === 0) return;
      saveCurrentDraft();
      currentIndex -= 1;
      renderQuestion();
    }

    function retryCurrent() {
      if (!filteredQuestions.length) return;
      const question = filteredQuestions[currentIndex];
      const state = questionStates[getQuestionKey(question)];
      if (!state.checked) return;
      state.checked = false;
      state.correct = null;
      state.retryCount += 1;
      state.answer = question.type === "text" ? "" : [];
      completed = false;
      renderQuestion();
    }

    function setFilter(mode) {
      saveCurrentDraft();
      currentFilter = mode;
      filteredQuestions = filterQuestions(mode);
      currentIndex = 0;
      completed = false;
      tabButtons.forEach(button => {
        button.classList.toggle("active", button.dataset.filter === mode);
      });
      renderQuestion();
    }

    function resetQuiz() {
      currentIndex = 0;
      completed = false;
      questionStates = createInitialState();
      setFilter("all");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    questionStates = createInitialState();
    filteredQuestions = filterQuestions(currentFilter);
    renderQuestion();

    checkBtn.addEventListener("click", checkCurrentAnswer);
    nextBtn.addEventListener("click", goNext);
    prevBtn.addEventListener("click", goPrevious);
    retryBtn.addEventListener("click", retryCurrent);
    resetBtn.addEventListener("click", resetQuiz);
    tabButtons.forEach(button => {
      button.addEventListener("click", () => setFilter(button.dataset.filter));
    });
  </script>
